name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: node build.js
      - uses: actions/upload-artifact@v4
        with:
          name: browserjsdumper
          path: browserjsdumper.html
